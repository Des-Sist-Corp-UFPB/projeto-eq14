spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/caladrius_dev
    username: caladrius
    password: caladrius123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # validate: o Hibernate verifica se o schema do banco bate com as entidades,
      # mas NÃO modifica nada. O Flyway é responsável por criar/alterar as tabelas.
      # NUNCA use create-drop em produção — apaga todos os dados!
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    # Localização dos scripts de migração SQL
    locations: classpath:db/migration

logging:
  level:
    br.ufpb.dsc.caladrius: DEBUG
    org.springframework.web: DEBUG
