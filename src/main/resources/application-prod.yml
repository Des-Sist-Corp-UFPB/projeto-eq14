spring:
  datasource:
    # Em produção, as credenciais vêm de variáveis de ambiente — NUNCA hardcode!
    # Configure no sistema operacional, Docker, Kubernetes secrets, etc.
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      # O banco PostgreSQL é COMPARTILHADO entre as equipes da disciplina.
      # Limitar o pool a 5 conexões evita esgotar o número máximo de conexões
      # do servidor — sem isso, a aplicação pode falhar ao conectar.
      maximum-pool-size: 5
  jpa:
    hibernate:
      # validate: o Hibernate confere se as entidades batem com o schema criado
      # pelo Flyway, mas NÃO altera o banco. Quem cria/altera tabelas é o Flyway.
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

logging:
  level:
    root: WARN
    br.ufpb.dsc.caladrius: INFO
