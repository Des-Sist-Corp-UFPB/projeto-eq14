<!DOCTYPE html>
<!--
  Página de cadastro de passageiro (auto-cadastro público).

  Conforme o redesenho v3: telefone obrigatório; e-mail opcional (também serve
  para entrar/recuperar a conta). th:action="@{/registrar}" injeta o token CSRF.
-->
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Criar conta — CALADRIUS</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <style>
        body { min-height: 100vh; }
        .brand-pane {
            background: linear-gradient(135deg, #0f766e, #115e59);
            color: #fff; min-height: 100vh; padding: 3rem;
        }
        .auth-pane { min-height: 100vh; display: flex; align-items: center; }
        .auth-card { width: 100%; max-width: 460px; margin: 0 auto; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">

        <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center brand-pane">
            <h1 class="display-5 fw-bold mb-3">CALADRIUS</h1>
            <p class="fs-5 mb-2">Transporte municipal organizado, do pedido à viagem.</p>
            <p class="opacity-75">Solicitações, escalas e frota em um só lugar.</p>
            <p class="mt-auto small opacity-50 mb-0">© 2026 Caladrius — DSC/UFPB · eq14</p>
        </div>

        <div class="col-lg-6 auth-pane">
            <div class="auth-card p-4">
                <h2 class="h3 fw-bold mb-1">Criar conta</h2>
                <p class="text-muted mb-4">Leva menos de um minuto.</p>

                <form th:action="@{/registrar}" th:object="${registroForm}" method="post">

                    <!-- Erros globais (regra de negócio: telefone/e-mail em uso, CPF inválido).
                         Fica DENTRO do form para que #fields enxergue o objeto registroForm. -->
                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <ul class="mb-0">
                            <li th:each="err : ${#fields.globalErrors()}" th:text="${err}">Erro</li>
                        </ul>
                    </div>

                    <div class="mb-3">
                        <label for="nomeCompleto" class="form-label fw-semibold">Nome completo</label>
                        <input type="text" id="nomeCompleto" th:field="*{nomeCompleto}"
                               class="form-control" th:classappend="${#fields.hasErrors('nomeCompleto')} ? 'is-invalid'"
                               placeholder="Seu nome completo"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nomeCompleto')}"
                             th:errors="*{nomeCompleto}">Erro</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="telefone" class="form-label fw-semibold">Telefone</label>
                            <input type="text" id="telefone" th:field="*{telefone}"
                                   class="form-control" th:classappend="${#fields.hasErrors('telefone')} ? 'is-invalid'"
                                   placeholder="(83) 99999-9999"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('telefone')}"
                                 th:errors="*{telefone}">Erro</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="cpf" class="form-label fw-semibold">CPF</label>
                            <input type="text" id="cpf" th:field="*{cpf}"
                                   class="form-control" th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid'"
                                   placeholder="000.000.000-00"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('cpf')}"
                                 th:errors="*{cpf}">Erro</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">E-mail</label>
                        <input type="email" id="email" th:field="*{email}"
                               class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               placeholder="seu@email.com"/>
                        <div class="form-text">Opcional — usado para entrar e recuperar a conta.</div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                             th:errors="*{email}">Erro</div>
                    </div>

                    <div class="mb-4">
                        <label for="senha" class="form-label fw-semibold">Senha</label>
                        <input type="password" id="senha" th:field="*{senha}"
                               class="form-control" th:classappend="${#fields.hasErrors('senha')} ? 'is-invalid'"
                               placeholder="Mínimo de 6 caracteres" autocomplete="new-password"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('senha')}"
                             th:errors="*{senha}">Erro</div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-lg text-white" style="background-color:#0f766e;">
                            Criar conta
                        </button>
                    </div>
                </form>

                <p class="text-center text-muted mb-0">
                    Já tem uma conta?
                    <a th:href="@{/login}" class="fw-semibold text-decoration-none"
                       style="color:#0f766e;">Entrar</a>
                </p>
            </div>
        </div>

    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
