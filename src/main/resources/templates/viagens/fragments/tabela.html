<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="tabela">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Data</th>
                    <th>Destino</th>
                    <th>Veículo</th>
                    <th>Motorista</th>
                    <th>Saída → Chegada</th>
                    <th>Status</th>
                    <th class="text-center" style="width:80px">Ações</th>
                </tr>
            </thead>
            <tbody id="lista-viagens">
                <th:block th:each="viagem : ${viagens.content}"
                          th:insert="~{viagens/fragments/linha :: linha(viagem=${viagem})}">
                </th:block>
                <tr th:if="${viagens == null or viagens.content.empty}">
                    <td colspan="7" class="text-center text-muted py-5">Nenhuma viagem planejada.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${viagens != null and viagens.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li class="page-item" th:classappend="${viagens.first} ? 'disabled'">
                <a class="page-link" th:href="@{/viagens(pagina=${paginaAtual - 1})}">&laquo;</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, viagens.totalPages - 1)}"
                class="page-item" th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:href="@{/viagens(pagina=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${viagens.last} ? 'disabled'">
                <a class="page-link" th:href="@{/viagens(pagina=${paginaAtual + 1})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</th:block>
</body>
</html>
