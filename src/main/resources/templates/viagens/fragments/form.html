<!DOCTYPE html>
<!-- Fragmento do modal de criação de viagem (apenas criação). -->
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modal">
    <div class="modal fade" id="modalForm" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header text-white" style="background-color:var(--cal-primary);">
                    <h5 class="modal-title">Nova viagem</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <form th:object="${form}"
                      hx-post="/viagens" hx-target="#lista-viagens" hx-swap="beforeend"
                      hx-on--after-request="if(event.detail.successful){ bootstrap.Modal.getInstance(document.getElementById('modalForm')).hide(); }">
                    <div class="modal-body">

                        <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
                            <ul class="mb-0">
                                <li th:each="err : ${#fields.globalErrors()}" th:text="${err}">Erro</li>
                            </ul>
                        </div>

                        <div class="alert alert-warning" th:if="${motoristas == null or motoristas.empty}">
                            Nenhum motorista cadastrado ainda. Cadastre um usuário com o papel
                            <strong>Motorista</strong> antes de criar a viagem.
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Veículo <span class="text-danger">*</span></label>
                            <select th:field="*{veiculoId}" class="form-select"
                                    th:classappend="${#fields.hasErrors('veiculoId')} ? 'is-invalid'">
                                <option value="">Selecione...</option>
                                <option th:each="v : ${veiculosDisponiveis}" th:value="${v.id}"
                                        th:text="${v.placa} + ' — ' + ${v.modelo} + ' (' + ${v.capacidade} + ' lug.)'"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('veiculoId')}" th:errors="*{veiculoId}">Erro</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Motorista <span class="text-danger">*</span></label>
                                <select th:field="*{motoristaId}" class="form-select"
                                        th:classappend="${#fields.hasErrors('motoristaId')} ? 'is-invalid'">
                                    <option value="">Selecione...</option>
                                    <option th:each="m : ${motoristas}" th:value="${m.id}" th:text="${m.nomeCompleto}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('motoristaId')}" th:errors="*{motoristaId}">Erro</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Cidade de destino <span class="text-danger">*</span></label>
                                <select th:field="*{cidadeDestinoId}" class="form-select"
                                        th:classappend="${#fields.hasErrors('cidadeDestinoId')} ? 'is-invalid'">
                                    <option value="">Selecione...</option>
                                    <option th:each="c : ${cidades}" th:value="${c.id}"
                                            th:text="${c.nome} + ' / ' + ${c.uf}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('cidadeDestinoId')}" th:errors="*{cidadeDestinoId}">Erro</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold">Data <span class="text-danger">*</span></label>
                                <input type="date" th:field="*{dataViagem}" class="form-control"
                                       th:classappend="${#fields.hasErrors('dataViagem')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('dataViagem')}" th:errors="*{dataViagem}">Erro</div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold">Saída <span class="text-danger">*</span></label>
                                <input type="time" th:field="*{horarioSaida}" class="form-control"
                                       th:classappend="${#fields.hasErrors('horarioSaida')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('horarioSaida')}" th:errors="*{horarioSaida}">Erro</div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold">Chegada <span class="text-danger">*</span></label>
                                <input type="time" th:field="*{horarioChegada}" class="form-control"
                                       th:classappend="${#fields.hasErrors('horarioChegada')} ? 'is-invalid'"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('horarioChegada')}" th:errors="*{horarioChegada}">Erro</div>
                            </div>
                        </div>

                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn text-white" style="background-color:var(--cal-primary);">Criar viagem</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
