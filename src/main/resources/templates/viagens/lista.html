<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Viagens</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Viagens</h1>
            <p class="text-muted mb-0">Planeje e acompanhe as viagens</p>
        </div>
        <button class="btn text-white" style="background-color:var(--cal-primary);"
                hx-get="/viagens/nova" hx-target="#modal-container" hx-swap="innerHTML">
            + Nova viagem
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div id="tabela-container">
                <th:block th:insert="~{viagens/fragments/tabela :: tabela}"></th:block>
            </div>
        </div>
    </div>
</main>
</body>
</html>
