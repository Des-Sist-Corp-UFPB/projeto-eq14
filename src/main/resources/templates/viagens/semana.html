<!DOCTYPE html>
<!-- Painel semanal (SPEC-06): dias no topo, viagens compactas por dia. -->
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Painel da semana</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h1 class="h3 mb-1">Painel da semana</h1>
            <p class="text-muted mb-0">
                <span th:text="${#temporals.format(painel.inicio, 'dd/MM')}">01/06</span> –
                <span th:text="${#temporals.format(painel.fim, 'dd/MM/yyyy')}">07/06</span>
            </p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/viagens/semana(ref=${painel.inicio.minusWeeks(1)})}">‹ Semana anterior</a>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/viagens/semana(ref=${painel.fim.plusDays(1)})}">Próxima semana ›</a>
        </div>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <div class="row g-2">
        <div class="col" style="min-width: 220px;" th:each="dia : ${painel.dias}">
            <div class="card h-100">
                <div class="card-header py-2">
                    <span class="fw-semibold" th:text="${dia.dia.rotulo}">Dia</span>
                    <span class="text-muted small" th:text="${#temporals.format(dia.data, 'dd/MM')}">01/06</span>
                </div>
                <div class="card-body p-2">
                    <p class="text-muted small text-center my-3" th:if="${dia.itens.empty}">—</p>

                    <div class="border rounded p-2 mb-2" th:each="item : ${dia.itens}">
                        <div class="small fw-semibold"
                             th:text="${item.linha.cidadeDestino.nome} + ' ' + ${item.linha.horarioSaida}">Destino 08:00</div>

                        <!-- Já designada -->
                        <div th:if="${item.designada()}">
                            <div class="small text-muted" th:text="'Mot.: ' + ${item.viagem.motorista.nomeCompleto}">Motorista</div>
                            <form th:action="@{'/viagens/' + ${item.viagem.id} + '/status'}" method="post" class="d-flex gap-1 mt-1">
                                <select name="status" class="form-select form-select-sm">
                                    <option th:each="s : ${T(br.ufpb.dsc.caladrius.domain.enums.StatusViagem).values()}"
                                            th:value="${s}" th:text="${s.rotulo}"
                                            th:selected="${s == item.viagem.status}">Status</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-outline-primary">OK</button>
                            </form>
                        </div>

                        <!-- A designar -->
                        <form th:if="${!item.designada()}" th:action="@{/viagens/designar}" method="post" class="mt-1">
                            <input type="hidden" name="linhaId" th:value="${item.linha.id}"/>
                            <input type="hidden" name="dataViagem" th:value="${dia.data}"/>
                            <select name="veiculoId" class="form-select form-select-sm mb-1" required>
                                <option value="">Veículo…</option>
                                <option th:each="v : ${veiculosDisponiveis}" th:value="${v.id}" th:text="${v.placa}">Placa</option>
                            </select>
                            <select name="motoristaId" class="form-select form-select-sm mb-1" required>
                                <option value="">Motorista…</option>
                                <option th:each="m : ${motoristas}" th:value="${m.id}" th:text="${m.nomeCompleto}">Motorista</option>
                            </select>
                            <button type="submit" class="btn btn-cal btn-sm w-100">Designar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
