<!DOCTYPE html>
<!-- Meu perfil — endereço estruturado do passageiro (SPEC-07). -->
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Meu perfil</title></head>
<body>
<main>
    <div class="mb-4">
        <h1 class="h3 mb-1">Meu perfil</h1>
        <p class="text-muted mb-0">Seu endereço de embarque. Necessário para solicitar viagens.</p>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

    <div class="card" style="max-width: 720px;">
        <div class="card-body">
            <form th:action="@{/perfil}" th:object="${form}" method="post">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="municipioId">Município</label>
                        <select class="form-select" id="municipioId" th:field="*{municipioId}">
                            <option value="">— Selecione —</option>
                            <option th:each="m : ${municipios}"
                                    th:value="${m.id}"
                                    th:text="${m.nome + ' / ' + m.uf}">Município</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="bairro">Bairro</label>
                        <input type="text" class="form-control" id="bairro" th:field="*{bairro}"
                               placeholder="Ex.: Jatobá"/>
                        <div class="form-text text-danger" th:if="${#fields.hasErrors('bairro')}" th:errors="*{bairro}"></div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-semibold" for="logradouro">Logradouro (rua/avenida)</label>
                        <input type="text" class="form-control" id="logradouro" th:field="*{logradouro}"
                               placeholder="Ex.: Rua das Flores"/>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold" for="numero">Número</label>
                        <input type="text" class="form-control" id="numero" th:field="*{numero}" placeholder="123"/>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="complemento">Complemento</label>
                        <input type="text" class="form-control" id="complemento" th:field="*{complemento}"
                               placeholder="Apto, bloco..."/>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold" for="cep">CEP</label>
                        <input type="text" class="form-control" id="cep" th:field="*{cep}" placeholder="58700-000"/>
                        <div class="form-text text-danger" th:if="${#fields.hasErrors('cep')}" th:errors="*{cep}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold" for="pontoReferencia">Ponto de referência</label>
                    <input type="text" class="form-control" id="pontoReferencia" th:field="*{pontoReferencia}"
                           placeholder="Ex.: próximo à igreja matriz"/>
                </div>

                <button type="submit" class="btn btn-cal">Salvar endereço</button>
            </form>
        </div>
    </div>

    <!-- Conta — suspensão (DT-02). A exclusão é responsabilidade de um cargo superior. -->
    <div class="card border-danger mt-4" style="max-width: 720px;">
        <div class="card-body">
            <h2 class="h6 text-danger mb-1">Conta</h2>
            <p class="text-muted small mb-3">
                Você pode <strong>solicitar a suspensão</strong> da sua conta. Você será desconectado e não
                conseguirá entrar até que um gestor a reative. A exclusão definitiva é feita por um cargo superior.
            </p>
            <form th:action="@{/conta/suspensao}" method="post" class="d-inline"
                  onsubmit="return confirm('Deseja solicitar a suspensão da sua conta? Você será desconectado.');">
                <button type="submit" class="btn btn-outline-danger">Solicitar suspensão da conta</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
