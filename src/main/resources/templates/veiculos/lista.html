<!DOCTYPE html>
<!-- Listagem de veículos. Reutiliza o layout via th:replace no <html>. -->
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Veículos</title></head>
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Veículos</h1>
            <p class="text-muted mb-0">Gerencie a frota de veículos</p>
        </div>
        <button class="btn text-white" style="background-color:#0f766e;"
                hx-get="/veiculos/novo" hx-target="#modal-container" hx-swap="innerHTML"
                hx-indicator="#spinner-veiculo">
            + Novo veículo
            <span id="spinner-veiculo" class="spinner-border spinner-border-sm htmx-indicator ms-1"
                  role="status" aria-hidden="true"></span>
        </button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-6">
                    <input type="search" name="busca" class="form-control"
                           placeholder="Buscar por placa, marca ou modelo..."
                           th:value="${busca}"
                           hx-get="/veiculos/fragmento-tabela"
                           hx-trigger="keyup changed delay:400ms, search"
                           hx-target="#tabela-container" hx-swap="innerHTML"/>
                </div>
                <div class="col-md-6 text-end">
                    <span class="text-muted small" th:if="${veiculos != null}">
                        <span th:text="${veiculos.totalElements}">0</span> veículo(s)
                    </span>
                </div>
            </div>

            <div id="tabela-container">
                <th:block th:insert="~{veiculos/fragments/tabela :: tabela}"></th:block>
            </div>
        </div>
    </div>
</main>
</body>
</html>
