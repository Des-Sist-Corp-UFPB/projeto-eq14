<!DOCTYPE html>
<!-- Fragmento da tabela de veículos (retornado nas buscas HTMX e na carga inicial). -->
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="tabela">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Placa</th>
                    <th>Marca / Modelo</th>
                    <th>Tipo</th>
                    <th class="text-center">Capac.</th>
                    <th class="text-center">Acessível</th>
                    <th>Status</th>
                    <th class="text-center" style="width:110px">Ações</th>
                </tr>
            </thead>
            <tbody id="lista-veiculos">
                <th:block th:each="veiculo : ${veiculos.content}"
                          th:insert="~{veiculos/fragments/linha :: linha(veiculo=${veiculo})}">
                </th:block>
                <tr th:if="${veiculos == null or veiculos.content.empty}">
                    <td colspan="7" class="text-center text-muted py-5">Nenhum veículo encontrado.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${veiculos != null and veiculos.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li class="page-item" th:classappend="${veiculos.first} ? 'disabled'">
                <a class="page-link" th:href="@{/veiculos(pagina=${paginaAtual - 1}, busca=${busca})}">&laquo;</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, veiculos.totalPages - 1)}"
                class="page-item" th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:href="@{/veiculos(pagina=${i}, busca=${busca})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${veiculos.last} ? 'disabled'">
                <a class="page-link" th:href="@{/veiculos(pagina=${paginaAtual + 1}, busca=${busca})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</th:block>
</body>
</html>
