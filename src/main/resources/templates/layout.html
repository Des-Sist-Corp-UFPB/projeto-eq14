<!DOCTYPE html>
<!--
  Layout base do CALADRIUS — todas as páginas internas o reutilizam.

  Mecânica Thymeleaf:
  - th:fragment="layout(content)" no <html> define o layout.
  - As páginas filhas usam th:replace="~{layout :: layout(~{::main})}" no <html>
    e fornecem seu conteúdo dentro de um único <main>.
  - O conteúdo é injetado onde aparece th:replace="${content}".

  A sidebar segue o redesenho v3 (seções OPERAÇÃO e CADASTROS) e só aparece para
  quem está autenticado; os itens de gestão exigem o papel GERENTE.
-->
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titulo != null ? titulo + ' — CALADRIUS' : 'CALADRIUS'}">CALADRIUS</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>

    <style>
        :root {
            --cal-primary: #0f766e;   /* teal-700 — identidade do CALADRIUS */
            --cal-primary-dark: #115e59;
            --cal-sidebar: #0b1f24;
        }
        body { background-color: #f5f7fa; }
        .navbar-cal {
            background: linear-gradient(135deg, var(--cal-primary), var(--cal-primary-dark));
        }
        .navbar-cal .navbar-brand { font-weight: 700; letter-spacing: .5px; }
        /* Sidebar */
        .sidebar {
            background-color: var(--cal-sidebar);
            min-height: calc(100vh - 56px);
            padding: 1rem .75rem;
        }
        .sidebar .nav-section {
            color: #6b8a90; font-size: .72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: .08em;
            padding: 1rem .75rem .25rem;
        }
        .sidebar .nav-link {
            color: #cde3e1; border-radius: .5rem; padding: .55rem .75rem;
            margin-bottom: .15rem; display: flex; align-items: center; gap: .6rem;
        }
        .sidebar .nav-link:hover { background-color: rgba(255,255,255,.06); color: #fff; }
        .sidebar .nav-link.active { background-color: var(--cal-primary); color: #fff; }
        .main-content { padding: 1.5rem; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
        .table-hover tbody tr:hover { background-color: #eef4f3; }
    </style>
</head>
<body>

<!-- ===================== Barra superior ===================== -->
<nav class="navbar navbar-expand navbar-dark navbar-cal px-3">
    <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor"
             viewBox="0 0 16 16" class="bi bi-bus-front">
            <path d="M5 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0m8 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0M3 4v3h10V4zm10.5-1A1.5 1.5 0 0 1 15 4.5V11a1 1 0 0 1-1 1v1.5a.5.5 0 0 1-1 0V12H3v1.5a.5.5 0 0 1-1 0V12a1 1 0 0 1-1-1V4.5A1.5 1.5 0 0 1 2.5 3z"/>
        </svg>
        CALADRIUS
    </a>

    <ul class="navbar-nav ms-auto" sec:authorize="isAuthenticated()">
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#"
               data-bs-toggle="dropdown" aria-expanded="false">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                     class="bi bi-person-circle" viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                </svg>
                <span sec:authentication="principal.nomeCompleto">Usuário</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><span class="dropdown-item-text small text-muted">
                    <span sec:authentication="principal.telefone">—</span>
                </span></li>
                <li><hr class="dropdown-divider"/></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="dropdown-item text-danger">Sair</button>
                    </form>
                </li>
            </ul>
        </li>
    </ul>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- ===================== Sidebar ===================== -->
        <aside class="col-12 col-md-3 col-lg-2 sidebar" sec:authorize="isAuthenticated()">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"
                       th:classappend="${requestURI == '/'} ? 'active'">Início</a>
                </li>
            </ul>

            <div sec:authorize="hasRole('GERENTE')">
                <div class="nav-section">Operação</div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/viagens}"
                           th:classappend="${requestURI != null and requestURI.startsWith('/viagens')} ? 'active'">Viagens</a>
                    </li>
                </ul>

                <div class="nav-section">Cadastros</div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/usuarios}"
                           th:classappend="${requestURI != null and requestURI.startsWith('/usuarios')} ? 'active'">Usuários</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/veiculos}"
                           th:classappend="${requestURI != null and requestURI.startsWith('/veiculos')} ? 'active'">Veículos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/cidades}"
                           th:classappend="${requestURI != null and requestURI.startsWith('/cidades')} ? 'active'">Cidades</a>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- ===================== Conteúdo ===================== -->
        <div class="col main-content">
            <th:block th:replace="${content}">
                <!-- Conteúdo da página filha é injetado aqui -->
            </th:block>
        </div>
    </div>
</div>

<!-- ===================== Scripts ===================== -->
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>

<!-- Container onde o HTMX injeta os modais de formulário -->
<div id="modal-container"></div>

<script>
    // Abre automaticamente qualquer modal injetado no #modal-container pelo HTMX.
    document.body.addEventListener('htmx:afterSwap', function (evt) {
        if (evt.detail.target.id === 'modal-container') {
            var modalEl = evt.detail.target.querySelector('.modal');
            if (modalEl) {
                new bootstrap.Modal(modalEl).show();
            }
        }
    });
</script>

</body>
</html>
