<!DOCTYPE html>
<!-- Visão do motorista: suas viagens + alteração de status (SPEC-06). -->
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Minhas viagens</title></head>
<body>
<main>
    <div class="mb-4">
        <h1 class="h3 mb-1">Minhas viagens</h1>
        <p class="text-muted mb-0">Viagens em que você foi designado. Atualize o status conforme a operação.</p>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr><th>Data</th><th>Destino</th><th>Horário</th><th>Veículo</th><th>Status</th><th style="width:260px">Atualizar</th></tr>
                </thead>
                <tbody>
                    <tr th:each="v : ${viagens}">
                        <td class="small" th:text="${#temporals.format(v.dataViagem, 'dd/MM/yyyy')}">01/06</td>
                        <td class="fw-semibold" th:text="${v.cidadeDestino.nome}">Destino</td>
                        <td class="small">
                            <span th:text="${v.horarioSaida}">08:00</span> – <span th:text="${v.horarioChegada}">10:00</span>
                        </td>
                        <td class="small" th:text="${v.veiculo.placa}">ABC1D23</td>
                        <td><span class="badge bg-info text-dark" th:text="${v.status.rotulo}">Status</span></td>
                        <td>
                            <form th:action="@{'/minhas-viagens/' + ${v.id} + '/status'}" method="post" class="d-flex gap-1">
                                <select name="status" class="form-select form-select-sm">
                                    <option th:each="s : ${T(br.ufpb.dsc.caladrius.domain.enums.StatusViagem).values()}"
                                            th:value="${s}" th:text="${s.rotulo}"
                                            th:selected="${s == v.status}">Status</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-cal">OK</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${viagens.empty}">
                        <td colspan="6" class="text-center text-muted py-5">Você ainda não tem viagens designadas.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
