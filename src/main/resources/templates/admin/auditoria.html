<!DOCTYPE html>
<!-- Trilha de auditoria — usada pela visão completa (sysadmin) e de operação (gerente). -->
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<head><title>Auditoria</title></head>
<body>
<main>
    <div class="mb-4">
        <h1 class="h3 mb-1" th:text="${titulo}">Auditoria</h1>
        <p class="text-muted mb-0" th:text="${subtitulo}">Trilha de eventos.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width:160px">Quando</th>
                            <th>Categoria</th>
                            <th>Ação</th>
                            <th>Usuário</th>
                            <th>Alvo</th>
                            <th>Detalhe</th>
                            <th>IP</th>
                            <th>Resultado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="log : ${logs.content}">
                            <td class="small text-nowrap"
                                th:text="${#temporals.format(log.instante, 'dd/MM/yyyy HH:mm')}">—</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${log.categoria.name() == 'SEGURANCA'} ? 'bg-warning text-dark'
                                                    : (${log.categoria.name() == 'SISTEMA'} ? 'bg-info text-dark' : 'bg-secondary')"
                                      th:text="${log.categoria.rotulo}">Categoria</span>
                            </td>
                            <td class="small fw-semibold" th:text="${log.acao}">ACAO</td>
                            <td class="small" th:text="${log.usuarioNome ?: '—'}">—</td>
                            <td class="small" th:text="${log.entidade != null ? log.entidade : '—'}">—</td>
                            <td class="small text-muted" th:text="${log.detalhe ?: '—'}">—</td>
                            <td class="small text-muted" th:text="${log.ip ?: '—'}">—</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${log.resultado == 'FALHA'} ? 'bg-danger' : 'bg-success'"
                                      th:text="${log.resultado}">—</span>
                            </td>
                        </tr>
                        <tr th:if="${logs.content.empty}">
                            <td colspan="8" class="text-center text-muted py-5">Nenhum evento registrado.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${logs.totalPages > 1}" class="mt-3">
                <ul class="pagination pagination-sm justify-content-center mb-0">
                    <li class="page-item" th:classappend="${logs.first} ? 'disabled'">
                        <a class="page-link" th:href="@{${baseUrl}(pagina=${paginaAtual - 1})}">&laquo;</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, logs.totalPages - 1)}"
                        class="page-item" th:classappend="${i == paginaAtual} ? 'active'">
                        <a class="page-link" th:href="@{${baseUrl}(pagina=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${logs.last} ? 'disabled'">
                        <a class="page-link" th:href="@{${baseUrl}(pagina=${paginaAtual + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
