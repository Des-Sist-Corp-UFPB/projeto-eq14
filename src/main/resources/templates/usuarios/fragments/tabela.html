<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="tabela">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Nome</th>
                    <th>Contato</th>
                    <th>Papéis</th>
                    <th>Status</th>
                    <th class="text-center" style="width:110px">Ações</th>
                </tr>
            </thead>
            <tbody id="lista-usuarios">
                <th:block th:each="usuario : ${usuarios.content}"
                          th:insert="~{usuarios/fragments/linha :: linha(usuario=${usuario})}">
                </th:block>
                <tr th:if="${usuarios == null or usuarios.content.empty}">
                    <td colspan="5" class="text-center text-muted py-5">Nenhum usuário encontrado.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${usuarios != null and usuarios.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li class="page-item" th:classappend="${usuarios.first} ? 'disabled'">
                <a class="page-link" th:href="@{/usuarios(pagina=${paginaAtual - 1}, busca=${busca})}">&laquo;</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, usuarios.totalPages - 1)}"
                class="page-item" th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:href="@{/usuarios(pagina=${i}, busca=${busca})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${usuarios.last} ? 'disabled'">
                <a class="page-link" th:href="@{/usuarios(pagina=${paginaAtual + 1}, busca=${busca})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</th:block>
</body>
</html>
