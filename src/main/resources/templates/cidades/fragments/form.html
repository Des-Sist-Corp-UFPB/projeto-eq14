<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modal">
    <div class="modal fade" id="modalForm" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header text-white" style="background-color:var(--cal-primary);">
                    <h5 class="modal-title" th:text="${cidade == null} ? 'Nova cidade' : 'Editar cidade'">Cidade</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <form th:object="${form}"
                      th:attr="hx-post=${cidade == null ? '/cidades' : null},
                               hx-put=${cidade != null ? '/cidades/' + cidade.id : null},
                               hx-target=${cidade == null ? '#lista-cidades' : '#cidade-' + cidade.id},
                               hx-swap=${cidade == null ? 'beforeend' : 'outerHTML'}"
                      hx-on--after-request="if(event.detail.successful){ bootstrap.Modal.getInstance(document.getElementById('modalForm')).hide(); }">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{nome}" class="form-control"
                                   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'" placeholder="Ex.: João Pessoa"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                        </div>
                        <div class="row">
                            <div class="col-4 mb-3">
                                <label class="form-label fw-semibold">UF <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{uf}" class="form-control text-uppercase"
                                       th:classappend="${#fields.hasErrors('uf')} ? 'is-invalid'" maxlength="2" placeholder="PB"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('uf')}" th:errors="*{uf}">Erro</div>
                            </div>
                            <div class="col-8 mb-3">
                                <label class="form-label fw-semibold">Tipo <span class="text-danger">*</span></label>
                                <select th:field="*{tipo}" class="form-select"
                                        th:classappend="${#fields.hasErrors('tipo')} ? 'is-invalid'">
                                    <option value="">Selecione...</option>
                                    <option th:each="t : ${tiposCidade}" th:value="${t}" th:text="${t.rotulo}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}">Erro</div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn text-white" style="background-color:var(--cal-primary);">
                            <span th:text="${cidade == null} ? 'Salvar' : 'Atualizar'">Salvar</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
