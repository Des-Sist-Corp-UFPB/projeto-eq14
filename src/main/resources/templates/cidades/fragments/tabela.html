<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="tabela">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Nome</th>
                    <th class="text-center">UF</th>
                    <th>Tipo</th>
                    <th class="text-center" style="width:110px">Ações</th>
                </tr>
            </thead>
            <tbody id="lista-cidades">
                <th:block th:each="cidade : ${cidades.content}"
                          th:insert="~{cidades/fragments/linha :: linha(cidade=${cidade})}">
                </th:block>
                <tr th:if="${cidades == null or cidades.content.empty}">
                    <td colspan="4" class="text-center text-muted py-5">Nenhuma cidade encontrada.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${cidades != null and cidades.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li class="page-item" th:classappend="${cidades.first} ? 'disabled'">
                <a class="page-link" th:href="@{/cidades(pagina=${paginaAtual - 1}, busca=${busca})}">&laquo;</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, cidades.totalPages - 1)}"
                class="page-item" th:classappend="${i == paginaAtual} ? 'active'">
                <a class="page-link" th:href="@{/cidades(pagina=${i}, busca=${busca})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${cidades.last} ? 'disabled'">
                <a class="page-link" th:href="@{/cidades(pagina=${paginaAtual + 1}, busca=${busca})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</th:block>
</body>
</html>
