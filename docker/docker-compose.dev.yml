# =============================================================================
# Docker Compose — DESENVOLVIMENTO
# =============================================================================
# Sobe o ambiente completo de desenvolvimento com:
#   - app:      Aplicação Spring Boot com hot-reload
#   - postgres: Banco de dados PostgreSQL 16
#   - adminer:  Interface web para inspecionar o banco (http://localhost:8888)
#   - trivy:    Scanner de vulnerabilidades (roda uma vez e sai)
#
# Como usar:
#   docker compose -f docker/docker-compose.dev.yml up
#   docker compose -f docker/docker-compose.dev.yml up --build  # forçar rebuild
#
# Para rodar só o banco:
#   docker compose -f docker/docker-compose.dev.yml up postgres adminer
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Banco de dados PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: caladrius-postgres-dev
    environment:
      POSTGRES_DB: caladrius_dev
      POSTGRES_USER: caladrius
      POSTGRES_PASSWORD: caladrius123
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caladrius -d caladrius_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caladrius-net

  # ---------------------------------------------------------------------------
  # Aplicação Spring Boot (hot-reload)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: caladrius-app-dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/caladrius_dev
      SPRING_DATASOURCE_USERNAME: caladrius
      SPRING_DATASOURCE_PASSWORD: caladrius123
    ports:
      - "8080:8080"
    volumes:
      # Monta o código-fonte para hot-reload
      - ../src:/app/src
      # Persistir dependências Maven (evita re-download a cada restart)
      - maven-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - caladrius-net

  # ---------------------------------------------------------------------------
  # Adminer: interface web para o banco de dados
  # Acesse: http://localhost:8888
  # Servidor: postgres | Banco: caladrius_dev | Usuário: caladrius | Senha: caladrius123
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: caladrius-adminer
    ports:
      - "8888:8080"
    depends_on:
      - postgres
    networks:
      - caladrius-net

  # ---------------------------------------------------------------------------
  # Trivy: scanner de vulnerabilidades (roda e sai — profile: scan)
  # Uso: docker compose -f docker/docker-compose.dev.yml --profile scan up trivy
  # ---------------------------------------------------------------------------
  trivy:
    image: aquasec/trivy:latest
    container_name: caladrius-trivy
    profiles:
      - scan
    volumes:
      - ..:/project:ro
      - trivy-cache:/root/.cache/trivy
    command: fs /project --severity HIGH,CRITICAL --exit-code 1
    networks:
      - caladrius-net

volumes:
  postgres-dev-data:
  maven-cache:
  trivy-cache:

networks:
  caladrius-net:
    driver: bridge
