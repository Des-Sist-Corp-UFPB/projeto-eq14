# =============================================================================
# Docker Compose — PRODUÇÃO (equipe eq14)
# =============================================================================
#
# O PostgreSQL é GERENCIADO pelo professor e COMPARTILHADO entre os times
# (a senha é enviada pelo professor, há um pgAdmin central e o usuário "eq14"
# já vem provisionado). Por isso a equipe NÃO sobe um banco próprio: este
# arquivo tem apenas a APLICAÇÃO, que conecta no serviço "postgres" já
# existente na rede Docker da disciplina.
#
# A imagem é construída pelo GitHub Actions e publicada no GHCR.
#
# CONFIGURAÇÃO — arquivo .env em /home/ghactions/eq14/.env no servidor:
#
#   APP_IMAGE=ghcr.io/des-sist-corp-ufpb/projeto-eq14:latest  ← atualizado pelo CI/CD
#   DATABASE_URL=jdbc:postgresql://postgres:5432/eq14
#   DATABASE_USERNAME=eq14
#   DATABASE_PASSWORD=<senha enviada pelo professor>
#   DB_NETWORK=<nome da rede Docker do professor onde o "postgres" está>
#
# A app é publicada em 127.0.0.1:8114 (somente localhost); o Caddy, já
# configurado no servidor, faz o proxy https://eq14.dsc.rodrigr.com → :8114.
# =============================================================================

# Nome do projeto Compose. Fixado para isolar a app por time mesmo o arquivo
# estando na subpasta docker/ (cujo nome seria usado como projeto por padrão).
name: eq14

services:

  # ---------------------------------------------------------------------------
  # Aplicação Spring Boot
  #
  # Usa a imagem pré-construída pelo CI/CD (GitHub Actions).
  # Conecta ao PostgreSQL compartilhado via host "postgres" na rede da disciplina.
  # ---------------------------------------------------------------------------
  app:
    image: ${APP_IMAGE}
    container_name: eq14-app-prod
    environment:
      # Credenciais vêm do .env do servidor — a senha é enviada pelo professor.
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/eq14}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-eq14}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    # A app escuta em 8080 dentro do container; publicamos APENAS em
    # 127.0.0.1:8114 do host (não em todas as interfaces), pois quem expõe
    # publicamente é o Caddy, fazendo proxy para essa porta.
    ports:
      - "127.0.0.1:8114:8080"
    # Healthcheck via Spring Actuator — o Docker só considera o container
    # saudável quando a aplicação estiver pronta para receber requisições.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s    # Spring Boot precisa de até 60s para inicializar
    restart: unless-stopped
    networks:
      - postgres-net

networks:
  # Rede EXTERNA, gerenciada pelo professor (já existe no servidor) — é onde
  # vive o container "postgres" compartilhado. external: true → o Compose NÃO
  # cria a rede, apenas conecta a app a ela.
  #
  # O nome real vem da variável DB_NETWORK no .env do servidor. Descubra-o no
  # Portainer (aba Networks, ou veja a rede do container "postgres") ou pergunte
  # ao professor, e defina DB_NETWORK=<nome> no .env.
  postgres-net:
    external: true
    name: ${DB_NETWORK}
